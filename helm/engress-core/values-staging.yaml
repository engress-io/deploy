replicaCount: 1

image:
  repository: 327796148992.dkr.ecr.us-east-2.amazonaws.com/engress-staging-core
  tag: latest
  pullPolicy: Always

serviceAccount:
  create: true
  name: engress-core
  annotations: {}

service:
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 192Mi
  limits:
    cpu: 300m
    memory: 384Mi

autoscaling:
  enabled: false

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /api/healthz
    alb.ingress.kubernetes.io/healthcheck-port: "8080"
  hosts:
    - host: core-origin.staging.engress.io
      paths:
        - path: /
          pathType: Prefix

config:
  baseDomain: staging.engress.io
  domainSuffix: .edge.staging.engress.io
  corsOrigin: https://staging.engress.io
  awsRegion: us-east-2
  logLevel: debug
  environment: staging
  staffOnly: true
  staffEmailDomains: "ghostweasel.net,engress.io"
  staffOrgId: ""

sessionKeySecret: engress-core-secrets-staging

pdb:
  minAvailable: 0
