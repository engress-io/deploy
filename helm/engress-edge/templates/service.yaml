apiVersion: v1
kind: Service
metadata:
  name: {{ include "engress-edge.fullname" . }}
  labels:
    {{- include "engress-edge.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "engress-edge.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
    - name: tunnel
      port: 4433
      targetPort: 4433
