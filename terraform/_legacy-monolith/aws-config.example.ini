# AWS CLI config snippet — append to ~/.aws/config
#
# After `aws configure sso`, or paste and fill YOUR_ACCOUNT_ID + YOUR_ROLE_NAME.
# Then: aws sso login --profile my-terraform-profile

[sso-session my-sso]
sso_region = us-east-2
sso_start_url = https://d-9a675bb81b.awsapps.com/start
sso_registration_scopes = sso:account:access

[profile my-terraform-profile]
sso_session = my-sso
sso_account_id = YOUR_ACCOUNT_ID_HERE
sso_role_name = YOUR_ROLE_NAME_HERE
region = us-east-2
